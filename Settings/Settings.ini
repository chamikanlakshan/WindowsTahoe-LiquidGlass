MouseOverAction=[!SetOption AboutAuthor FontColor "255,255,255,180"][!UpdateMeter AboutAuthor][!Redraw]
MouseLeaveAction=[!SetOption AboutAuthor FontColor "255,255,255,255"][!UpdateMeter AboutAuthor][!Redraw]

[AboutVersion]
Meter=String
Text=Version 1.0.2
FontFace=Inter
FontSize=10
FontWeight=400
FontColor=140,140,150,255
AntiAlias=1
StringAlign=Center
X=310
Y=8R
Group=AboutGroup

[AboutDivider]
Meter=Shape
Shape=Rectangle 0,0,300,1,0 | Fill Color 55,55,65,200 | StrokeWidth 0
X=160
Y=25R
Group=AboutGroup

[UpdateIcon]
Meter=Image
ImageName=#@#Images\Thumbs\Update.png
X=290
Y=25R
W=40
H=40
PreserveAspectRatio=1
AntiAlias=1
DynamicVariables=1
MouseActionCursor=1
LeftMouseUpAction=["https://www.deviantart.com/chamikanlakshan/art/Windows-Tahoe-Liquid-Glass-For-Rainmeter-1344499221"]
MouseOverAction=[!SetOption UpdateIcon ImageAlpha "180"][!UpdateMeter UpdateIcon][!Redraw]
MouseLeaveAction=[!SetOption UpdateIcon ImageAlpha "255"][!UpdateMeter UpdateIcon][!Redraw]
Group=AboutGroup

[UpdateTitle]
Meter=String
Text=Check for updates
FontFace=Inter
FontSize=11
FontWeight=600
FontColor=200,200,210,255
AntiAlias=1
StringAlign=Center
X=310
Y=8R
Group=AboutGroup

[MeasureTheme]
Measure=String
String=#Theme#
DynamicVariables=1
IfMatch=Light
IfMatchAction=[!SetOption ThemeLightPill Shape "Rectangle 0,0,150,42,12 | Fill Color 0,122,255,255 | StrokeWidth 0"][!SetOption ThemeLightPillLabel FontColor "255,255,255,255"][!SetOption ThemeDarkPill Shape "Rectangle 0,0,150,42,12 | Fill Color 45,45,55,255 | StrokeWidth 1 | Stroke Color 70,70,82,255"][!SetOption ThemeDarkPillLabel FontColor "255,255,255,255"][!UpdateMeter ThemeLightPill][!UpdateMeter ThemeLightPillLabel][!UpdateMeter ThemeDarkPill][!UpdateMeter ThemeDarkPillLabel][!Redraw]
IfNotMatchAction=[!SetOption ThemeDarkPill Shape "Rectangle 0,0,150,42,12 | Fill Color 0,122,255,255 | StrokeWidth 0"][!SetOption ThemeDarkPillLabel FontColor "255,255,255,255"][!SetOption ThemeLightPill Shape "Rectangle 0,0,150,42,12 | Fill Color 45,45,55,255 | StrokeWidth 1 | Stroke Color 70,70,82,255"][!SetOption ThemeLightPillLabel FontColor "255,255,255,255"][!UpdateMeter ThemeLightPill][!UpdateMeter ThemeLightPillLabel][!UpdateMeter ThemeDarkPill][!UpdateMeter ThemeDarkPillLabel][!Redraw]
UpdateDivider=5

[MeasureBlurState]
Measure=Calc
Formula=#BlurDisabled#
DynamicVariables=1
IfCondition=MeasureBlurState = 0
IfTrueAction=[!SetOption BlurToggle ImageName "#@#Images\Toggles\ToggleOn.png"][!UpdateMeter BlurToggle][!Redraw]
IfFalseAction=[!SetOption BlurToggle ImageName "#@#Images\Toggles\ToggleOff.png"][!UpdateMeter BlurToggle][!Redraw]
UpdateDivider=5

[MeasureTransparencyState]
Measure=Calc
Formula=#TransparencyDisabled#
DynamicVariables=1
IfCondition=MeasureTransparencyState = 0
IfTrueAction=[!SetOption TransparencyToggle ImageName "#@#Images\Toggles\ToggleOn.png"][!UpdateMeter TransparencyToggle][!Redraw]
IfFalseAction=[!SetOption TransparencyToggle ImageName "#@#Images\Toggles\ToggleOff.png"][!UpdateMeter TransparencyToggle][!Redraw]
UpdateDivider=5