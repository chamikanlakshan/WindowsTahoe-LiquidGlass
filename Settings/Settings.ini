[Rainmeter]
DynamicWindowSize=1
Update=1000
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!UpdateMeasure MeasureActiveTab][!Redraw]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
@Include2=#@#ActiveWidgets.inc
@Include3=#@#Shadow.inc
PW=620
PH=540

[MeasureThemeSwitcher]
Measure=Script
ScriptFile=#@#ThemeSwitcher.lua
UpdateDivider=-1

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=#PW#
XHeight=#PH#
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 255,255,255,255 | StrokeWidth 0

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=#PW#
H=#PH#
Container=BlurContainer
UpdateDivider=-1

[Background]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 20,20,24,220 | StrokeWidth #StrokeWidth# | Stroke Color 60,60,70,180
X=0
Y=0
DynamicVariables=1

[MeasureActiveTab]
Measure=Calc
Formula=#ActiveTab#
DynamicVariables=1
IfCondition=MeasureActiveTab = 1
IfTrueAction=[!SetOption TabAppearance FontColor "255,255,255,255"][!SetOption TabWidgets FontColor "140,140,150,255"][!SetOption TabAbout FontColor "140,140,150,255"][!ShowMeterGroup AppearanceGroup][!HideMeterGroup WidgetsGroup][!HideMeterGroup AboutGroup][!UpdateMeter *][!Redraw]
IfCondition2=MeasureActiveTab = 2
IfTrueAction2=[!SetOption TabAppearance FontColor "140,140,150,255"][!SetOption TabWidgets FontColor "255,255,255,255"][!SetOption TabAbout FontColor "140,140,150,255"][!HideMeterGroup AppearanceGroup][!ShowMeterGroup WidgetsGroup][!HideMeterGroup AboutGroup][!UpdateMeter *][!Redraw]
IfCondition3=MeasureActiveTab = 3
IfTrueAction3=[!SetOption TabAppearance FontColor "140,140,150,255"][!SetOption TabWidgets FontColor "140,140,150,255"][!SetOption TabAbout FontColor "255,255,255,255"][!HideMeterGroup AppearanceGroup][!HideMeterGroup WidgetsGroup][!ShowMeterGroup AboutGroup][!UpdateMeter *][!Redraw]

[TabAppearance]
Meter=String
Text=Appearance
FontFace=Inter
FontSize=14
FontWeight=700
FontColor=255,255,255,255
AntiAlias=1
X=35
Y=30
MouseActionCursor=1
LeftMouseUpAction=[!WriteKeyValue Variables ActiveTab 1 "#@#GlobalSettings.inc"][!SetVariable ActiveTab 1][!UpdateMeasure MeasureActiveTab][!Redraw]
MouseOverAction=[!SetOption TabAppearance FontColor "255,255,255,255"][!UpdateMeter TabAppearance][!Redraw]
MouseLeaveAction=[!UpdateMeasure MeasureActiveTab]

[TabWidgets]
Meter=String
Text=Widgets
FontFace=Inter
FontSize=14
FontWeight=700
FontColor=140,140,150,255
AntiAlias=1
X=25R
Y=0r
MouseActionCursor=1
LeftMouseUpAction=[!WriteKeyValue Variables ActiveTab 2 "#@#GlobalSettings.inc"][!SetVariable ActiveTab 2][!UpdateMeasure MeasureActiveTab][!Redraw]
MouseOverAction=[!SetOption TabWidgets FontColor "255,255,255,255"][!UpdateMeter TabWidgets][!Redraw]
MouseLeaveAction=[!UpdateMeasure MeasureActiveTab]

[TabAbout]
Meter=String
Text=About
FontFace=Inter
FontSize=14
FontWeight=700
FontColor=140,140,150,255
AntiAlias=1
X=25R
Y=0r
MouseActionCursor=1
LeftMouseUpAction=[!WriteKeyValue Variables ActiveTab 3 "#@#GlobalSettings.inc"][!SetVariable ActiveTab 3][!UpdateMeasure MeasureActiveTab][!Redraw]
MouseOverAction=[!SetOption TabAbout FontColor "255,255,255,255"][!UpdateMeter TabAbout][!Redraw]
MouseLeaveAction=[!UpdateMeasure MeasureActiveTab]

[TabAppearanceIndicator]
Meter=Shape
Shape=Rectangle 0,0,([TabAppearance:W]),3,1.5 | Fill Color 0,122,255,255 | StrokeWidth 0
X=35
Y=10R
DynamicVariables=1
Group=AppearanceGroup

[TabWidgetsIndicator]
Meter=Shape
Shape=Rectangle 0,0,([TabWidgets:W]),3,1.5 | Fill Color 0,122,255,255 | StrokeWidth 0
X=([TabWidgets:X])
Y=0r
DynamicVariables=1
Group=WidgetsGroup

[TabAboutIndicator]
Meter=Shape
Shape=Rectangle 0,0,([TabAbout:W]),3,1.5 | Fill Color 0,122,255,255 | StrokeWidth 0
X=([TabAbout:X])
Y=0r
DynamicVariables=1
Group=AboutGroup

