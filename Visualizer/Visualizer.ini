[Rainmeter]
Update=33
Group=WidgetsLight
DynamicWindowSize=0
BackgroundMode=1
SkinWidth=380
SkinHeight=160

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Center Horizontally
ContextAction=[!Move "(#SCREENAREAWIDTH#/2-#CURRENTCONFIGWIDTH#/2)" "#CURRENTCONFIGY#"]
ContextTitle2=Center Vertically
ContextAction2=[!Move "#CURRENTCONFIGX#" "(#SCREENAREAHEIGHT#/2-#CURRENTCONFIGHEIGHT#/2)"]
ContextTitle3=Center Both
ContextAction3=[!Move "(#SCREENAREAWIDTH#/2-#CURRENTCONFIGWIDTH#/2)" "(#SCREENAREAHEIGHT#/2-#CURRENTCONFIGHEIGHT#/2)"]
ContextTitle4=----
ContextAction4=[]
ContextTitle5=Refresh skin
ContextAction5=[!Refresh]
ContextTitle6=Settings
ContextAction6=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle7=----
ContextAction7=[]
ContextTitle8=Close
ContextAction8=[!WriteKeyValue Variables ShowVisualizer "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Visualizer
Version=1.0.0

[Variables]
NumBands=32

[MeasureAudio]
Measure=Plugin
Plugin=AudioLevel
Port=Output
FFTSize=2048
FFTOverlap=1024
