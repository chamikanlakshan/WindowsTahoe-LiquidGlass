[Rainmeter]
Update=5000
AccurateText=1
Group=WidgetsLight
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw][!UpdateMeasure MeasureBatterySaver][!UpdateMeasure MeasureACStatus]


RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Dark
ContextAction2=[!WriteKeyValue Variables ThemeBattery "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Battery" "BatteryDark.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowBattery "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.3
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)
[Variables]
@Include1=#@#GlobalSettings.inc
@Include2=#@#Battery/Variables.inc
ThemeBattery=Light
LocalTransparency=0
Bat.W=#BatterySize#
Bat.H=#BatterySize#
Bat.Height=#BatterySize#
Bat.Width=#BatterySize#


LG.W=#Bat.Width#
LG.H=#Bat.Height#
LG.R=#Bat.Height#*0.18

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=(#Bat.W#*#ScaleDpi#)
XHeight=(#Bat.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

@includeShadow=#@#Shadow.inc

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#Bat.Width#*#ScaleDpi#),(#Bat.Height#*#ScaleDpi#),(#Bat.Height#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#Bat.Width#*#ScaleDpi#)
H=(#Bat.Height#*#ScaleDpi#)
Container=BlurContainer
UpdateDivider=-1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#Bat.Width#*#ScaleDpi#),(#Bat.Height#*#ScaleDpi#),(#Bat.Height#*0.18*#ScaleDpi#) | StrokeWidth (#StrokeWidth#*#ScaleDpi#) | Stroke Color 255,255,255,60 | Fill LinearGradient FillGradient
FillGradient=#LightGradient#
X=0
Y=0
AntiAlias=1

[MeasureBattery]
Measure=Plugin
Plugin=PowerPlugin
PowerState=Percent
UpdateDivider=12
DynamicVariables=1

[MeasureBatterySaver]
Measure=Registry
RegHKey=HKEY_LOCAL_MACHINE
RegKey=SYSTEM\CurrentControlSet\Control\Power
RegValue=EnergySaverState
UpdateDivider=2


[MeasureACStatus]
Measure=Plugin
Plugin=PowerPlugin
PowerState=ACLine
UpdateDivider=2

[LuaRing]
Measure=Script
ScriptFile=#CURRENTPATH#BatteryRing.lua
UpdateDivider=1

[MeterBatteryRingBG]
Meter=Shape
X=0
Y=0
W=(#Bat.Width# * #ScaleDpi#)
H=(#Bat.Height# * #ScaleDpi#)
LineColor=174,174,178,160
Shape=Arc 0,0,1,1,0,0.01 | StrokeWidth 1 | Stroke Color 174,174,178,160 | StrokeStartCap round | StrokeEndCap round | Fill Color 0,0,0,0
AntiAlias=1

[MeterBatteryRing]
Meter=Shape
X=0
Y=0
W=(#Bat.Width# * #ScaleDpi#)
H=(#Bat.Height# * #ScaleDpi#)
Shape=Arc 0,0,1,1,0,0.01 | StrokeWidth 1 | Stroke Color 50,215,75,255 | StrokeStartCap round | StrokeEndCap round | Fill Color 0,0,0,0
AntiAlias=1

[ChargingIcon]
Meter=Image
ImageName=#@#Images/Battery/#ThemeBattery#/Charging.png
X=(#Bat.Width# * #ScaleDpi# * 0.45)
Y=(#Bat.Height# * #ScaleDpi# * 0.166)
W=(#Bat.Height# * #ScaleDpi# * 0.11)
H=(#Bat.Height# * #ScaleDpi# * 0.11)
Hidden=1

[MeterBatteryIcon]
Meter=Image
ImageName=#@#Images/Battery/#ThemeBattery#/Macbook.png
W=(#Bat.Height# * #ScaleDpi# * 0.22)
H=(#Bat.Height# * #ScaleDpi# * 0.22)
X=((#Bat.Width# * #ScaleDpi# / 2) - (#Bat.Height# * #ScaleDpi# * 0.11))
Y=(#Bat.Height# * #ScaleDpi# * 0.293)
AntiAlias=1

[MeterBatteryText]
Meter=String
MeasureName=MeasureBattery
Text="%1%"
X=(#Bat.Width# * #ScaleDpi# / 2)
Y=(#Bat.Height# * #ScaleDpi# * 0.76)
StringAlign=CenterCenter
FontFace=Inter
FontWeight=#Bat.FontWeight#
FontSize=(#Bat.Height# * #TextSizeRatio# * #ScaleDpi#)
FontColor=0,0,0,255
InlineSetting=CharacterSpacing | -1
AntiAlias=1

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-#ThemeBattery#
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=1-Light
IfMatchAction2=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]



