
[Rainmeter]
DynamicWindowSize=1
Update=1000
AccurateText=1
DefaultWindowX=50%
DefaultWindowY=50%
DefaultAnchorX=50%
DefaultAnchorY=50%

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.3
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
@Include2=#@#Shadow.inc
PW=480
PH=220
LG.W=#PW#
LG.H=#PH#
LG.R=20
FontFace=SF Pro Display
SuiteName=Windows Tahoe - Liquid Glass

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=#PW#
XHeight=#PH#
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=#PW#
H=#PH#
Container=BlurContainer
UpdateDivider=-1

[Background]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 20,20,24,220 | StrokeWidth #StrokeWidth# | Stroke Color 60,60,70,180
X=0
Y=0
DynamicVariables=1

[TitleText]
Meter=String
Text=Welcome to Windows Tahoe
FontFace=#FontFace#
FontSize=16
FontWeight=700
FontColor=255,255,255,255
AntiAlias=1
X=(#PW# / 2)
Y=50
StringAlign=Center
DynamicVariables=1

[SubtitleText]
Meter=String
Text=Liquid Glass
FontFace=#FontFace#
FontSize=12
FontWeight=400
FontColor=0,160,255,200
AntiAlias=1
X=(#PW# / 2)
Y=10R
StringAlign=Center
DynamicVariables=1

[ActivateBtn]
Meter=Shape
Shape=Rectangle 0,0,240,40,8 | Fill Color 0,120,212,255 | StrokeWidth 0
X=((#PW# - 240) / 2)
Y=15R
MouseActionCursor=1
LeftMouseUpAction=[!ActivateConfig "#SuiteName#\Setup\1" "Layout.ini"][!DeactivateConfig]
MouseOverAction=[!SetOption ActivateBtn Shape "Rectangle 0,0,240,40,8 | Fill Color 0,100,190,255 | StrokeWidth 0"][!UpdateMeter ActivateBtn][!Redraw]
MouseLeaveAction=[!SetOption ActivateBtn Shape "Rectangle 0,0,240,40,8 | Fill Color 0,120,212,255 | StrokeWidth 0"][!UpdateMeter ActivateBtn][!Redraw]
DynamicVariables=1

[ActivateBtnText]
Meter=String
Text=Activate Windows Tahoe
FontFace=#FontFace#
FontSize=11
FontWeight=600
FontColor=255,255,255,255
AntiAlias=1
X=(#PW# / 2)
Y=11r
StringAlign=Center
MouseActionCursor=1
LeftMouseUpAction=[!ActivateConfig "#SuiteName#\Setup\1" "Layout.ini"][!DeactivateConfig]
DynamicVariables=1
