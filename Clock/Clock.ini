[Rainmeter]
Update=5000
Group=WidgetsLight
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Dark
ContextAction2=[!WriteKeyValue Variables ThemeClock "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Clock" "ClockDark.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparencyClock "(1-#LocalTransparencyClock#)" "#@#GlobalSettings.inc"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowClock "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@include=#@#GlobalSettings.inc
Clock.Size=#ClockSize#
Size=#ClockSize#
@include2=#@#Styles.inc

[MeasureTime]
Measure=Time

[MeterClockFace]
Meter=Image
ImageName=#@#Images\Clock\ClockFace.png
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
X=0
Y=0
AntiAlias=1
UpdateDivider=-1

[MeterClockNumbers]
Meter=Image
ImageName=#@#Images\Clock\ClockNumbers.png
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
UpdateDivider=-1

[MeterHoursHand]
Meter=Rotator
MeasureName=MeasureTime
ImageName=#@#Images\Clock\HoursHand.png
X=0
Y=0
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
TransformationMatrix=((#Size#*#ScaleDpi#)/#SourceSize#);0;0;((#Size#*#ScaleDpi#)/#SourceSize#);((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Size#*#ScaleDpi#/2));((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Size#*#ScaleDpi#/2))
ValueRemainder=43200
AntiAlias=1
UpdateDivider=60

[MeterMinutesHand]
Meter=Rotator
MeasureName=MeasureTime
ImageName=#@#Images\Clock\MinutesHand.png
X=0
Y=0
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
TransformationMatrix=((#Size#*#ScaleDpi#)/#SourceSize#);0;0;((#Size#*#ScaleDpi#)/#SourceSize#);((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Size#*#ScaleDpi#/2));((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Size#*#ScaleDpi#/2))
ValueRemainder=3600
AntiAlias=1
UpdateDivider=10

[MeterSecondsHand]
Meter=Rotator
MeasureName=MeasureTime
ImageName=#@#Images\Clock\SecondsHand.png
X=0
Y=0
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
TransformationMatrix=((#Size#*#ScaleDpi#)/#SourceSize#);0;0;((#Size#*#ScaleDpi#)/#SourceSize#);((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Size#*#ScaleDpi#/2));((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Size#*#ScaleDpi#/2))
ValueRemainder=60
AntiAlias=1
UpdateDivider=1

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparencyClock#-Light
DynamicVariables=1
IfMatch=1-Light
IfMatchAction=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=0-Light
IfMatchAction2=[!SetOption Shape FillGradient "#LightGradient#"][!UpdateMeter *][!Redraw]