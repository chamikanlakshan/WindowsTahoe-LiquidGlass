[Rainmeter]
Update=60000
Group=WidgetsDark
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Light
ContextAction2=[!WriteKeyValue Variables ThemeCalendar "Light" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Calendar\Calendar" "Calendar.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!UpdateMeasure MeasureApplyLocalTransparency][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Next Month
ContextAction6=[!CommandMeasure Lua Move(1)][!Update]
ContextTitle6=Next Year
ContextAction6=[!CommandMeasure Lua Move(12)][!Update]
ContextTitle7=Previous Month
ContextAction7=[!CommandMeasure Lua Move(-1)][!Update]
ContextTitle8=Previous Year
ContextAction8=[!CommandMeasure Lua Move(-12)][!Update]
ContextTitle9=Current Month
ContextAction9=[!CommandMeasure Lua Move()][!Update]
ContextTitle10=----
ContextAction10=[]
ContextTitle11=Close
ContextAction11=[!WriteKeyValue Variables ShowCalendar "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
MouseScrollUpAction=!CommandMeasure Lua "CombineScroll(1)"
MouseScrollDownAction=!CommandMeasure Lua "CombineScroll(-1)"

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

@include1=#@#Calender\CalendarVariables.ini
@include2=#@#GlobalSettings.inc
@include3=#@#Calender\Variables.inc

[Variables]
LocalTransparency=0
C.w=#Cal.C.w#
C.h=#Cal.C.h#
Space.x=#Cal.Space.x#
Space.y=#Cal.Space.y#
Bumper.x=#Cal.Bumper#
Bumper.left=#Cal.Bumper#
Bumper.right=#Cal.Bumper#
Bumper.top=#Cal.Bumper#
Bumper.bottom=#Cal.Bumper#
Cal.FontSize=#Cal.FontSize#
Cal.W=#Cal.W#
Cal.H=#Cal.H#

Cal.Color.Today=#CalDark.Color.Today#

MonthLabels=JANUARY|FEBRUARY|MARCH|APRIL|MAY|JUNE|JULY|AUGUST|SEPTEMBER|OCTOBER|NOVEMBER|DECEMBER
LabelText={$MName}

Month=0
Year=0
Day=0
Week=0
ThisWeek=0
NotCurrentMonth=0
LastWkHidden=0

CalOffsetY=0

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=(#CURRENTCONFIGX# + #Blur.OffsetX#)
YPos=(#CURRENTCONFIGY# + #Blur.OffsetY#)
XWidth=(#Cal.W#*#ScaleDpi#)
XHeight=(#Cal.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[Lua]
Measure=Script
ScriptFile=#@#Calender\Calendar.lua

[LblTxtSty]
H=#C.h#
W=#C.w#
X=#Space.X#R
Y=r
FontFace=#Cal.FontFace#
FontWeight=#Cal.FontWeight#
FontColor=#CalDark.Color.DayNames#
FontSize=#Cal.FontSize#
StringAlign=CenterCenter
AntiAlias=1

[LblTxtStart]

[LblCurrSty]
FontWeight=#Cal.FontWeight#

[TextStyle]
H=#C.h#
W=#C.w#
X=(#Space.x#+#C.w#)r
Y=r
FontColor=#CalDark.Color.Dates#
FontFace=#Cal.FontFace#
FontWeight=#Cal.FontWeight#
FontSize=#Cal.FontSize#
StringAlign=CenterCenter
AntiAlias=1

[FirstDay]

[NewWk]
Y=#Space.y#R

[CurrentDay]
FontWeight=#Cal.FontWeight#
FontColor=#CalDark.Color.TodayText#

[LastWeek]
FontColor=0,0,0,0

[PreviousMonth]
FontColor=0,0,0,0

[NextMonth]
FontColor=0,0,0,0

[HolidayStyle]
FontColor=170,170,170,100

[WeekendStyle]
FontColor=#CalDark.Color.WeekendDates#

[BlurContainer1D]
Meter=Shape
Shape=Rectangle 0,0,(#Cal.W#*#ScaleDpi#),(#Cal.H#*#ScaleDpi#),(#Cal.H#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

[BlurImage]
Meter=Image
MeasureName=MeasureBlur
DynamicVariables=1
X=0
Y=0
W=(#Cal.W#*#ScaleDpi#)
H=(#Cal.H#*#ScaleDpi#)
Container=BlurContainer1D

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#Cal.W#*#ScaleDpi#),(#Cal.H#*#ScaleDpi#),(#Cal.H#*0.18*#ScaleDpi#) | StrokeWidth (3*#ScaleDpi#) | Stroke Color #CalDark.Color.Border# | Fill LinearGradient FillGradient
FillGradient=#DarkGradient#
X=0
Y=0
AntiAlias=1
DynamicVariables=1

[TodayCircle]
Meter=Shape
Shape=Ellipse 0,0,1 | Fill Color #CalDark.Color.Today# | StrokeWidth 0
X=0
Y=0
W=#C.w#
H=#C.h#
Hidden=1
DynamicVariables=1
AntiAlias=1

[mLabel]
Meter=String
Text=#MonthLabel#
W=(#C.w#*7+#Space.x#*6)
X=(#CalSize#/11+5.7)
Y=(#CalSize#/11)
H=#C.h#
FontColor=#CalDark.Color.Month#
FontFace=#Cal.FontFace#
FontWeight=#Cal.FontWeight#
FontSize=#Cal.FontSize#
StringAlign=LeftCenter
AntiAlias=1
DynamicVariables=1

[ControlForward]
Meter=String
MeterStyle=TextStyle
FontFace=Webdings
StringAlign=Left
Text="4"
Y=#Bumper.top#
X=((#C.w#*6+#Space.x#*6)+#Bumper.left#)
LeftMouseUpAction=[!CommandMeasure "Lua" "Move(1)"][!Update]
Hidden=1

[ControlBack]
Meter=String
MeterStyle=TextStyle|ControlForward
Text="3"
X=#Bumper.left#
LeftMouseUpAction=[!CommandMeasure "Lua" "Move(-1)"][!Update]
Hidden=1

[ControlHome]
Meter=String
MeterStyle=TextStyle|ControlForward
Text="="
X=R
LeftMouseUpAction=[!CommandMeasure "Lua" "Move()"][!Update]
Hidden=1

[Ghost]
Meter=Image
SolidColor=0,0,0,1
H=1
W=1
X=(#Cal.W#-1)
Y=(#Cal.H#-1)
DynamicVariables=1

-- try thsi at 400 41,38,406,353.3 cnetr 41,38,364,353.3 old debug broder

[DebugBorder]
Meter=Shape
Shape=Rectangle 0,0,(#CalSize#*49/55+#CalSize#*24/500),(#CalSize#*49/55+#CalSize#*24/500) | Fill Color 0,0,0,0 | StrokeWidth 10 | Stroke Color 255,0,0,100
X=(#CalSize#/11)
Y=(#CalSize#/11+#CalSize#*21/500)
DynamicVariables=1
AntiAlias=0
Hidden = 1

