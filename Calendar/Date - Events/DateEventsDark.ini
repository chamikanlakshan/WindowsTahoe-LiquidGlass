[Rainmeter]
Update=60000
Group=WidgetsDark
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Light
ContextAction2=[!WriteKeyValue Variables ThemeDateEvents "Light" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Calendar\Date - Events" "DateEvents.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparencyDateEvents "(1-#LocalTransparencyDateEvents#)" "#@#GlobalSettings.inc"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowDateEvents "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
LocalTransparency=1
@include1=#@#GlobalSettings.inc
@include2=#@#Calendar\Variables.inc


[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=(#CURRENTCONFIGX# + #DateDark.Blur.OffsetX#)
YPos=(#CURRENTCONFIGY# + #DateDark.Blur.OffsetY#)
XWidth=(#DateEventsDark.IconSize#*#ScaleDpi#)
XHeight=(#DateEventsDark.IconSize#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureDayName]
Measure=Time
Format=%A
UpdateDivider=3600

[MeasureDayNumber]
Measure=Time
Format=%#d
UpdateDivider=3600

[MeasureInput]
Measure=Plugin
Plugin=InputText
X=(#DateEventsDark.IconSize#/2*0.2*#ScaleDpi#)
Y=(#DateEventsDark.IconSize#*0.62*#ScaleDpi#)
W=(#DateEventsDark.IconSize#*0.8*#ScaleDpi#)
H=(#DateEventsDark.IconSize#*0.12*#ScaleDpi#)
FontSize=(#DateEventsDark.IconSize#*0.08*#ScaleDpi#)
FontFace=#DateEventsDark.FontFace#
FontWeight=#DateEventsDark.Events.FontWeight#
FontColor=0,0,0
SolidColor=255,255,255
FocusDismiss=1
DefaultValue="#ManualNote#"
DynamicVariables=1
Command1=[!WriteKeyValue Variables ManualNote "$UserInput$" "#@#Calendar\Variables.inc"][!CommandMeasure MeasureEventManager "CompactEvents()"][!Refresh]

