Substitute="^$":"|"
DynamicVariables=1
UpdateDivider=-1
IfMatch=^\|$
IfMatchAction=[!SetOption MeterEventLabel2 FontColor "255,255,255,100"][!SetOption MeterEventLabel2 ToolTipText "Click to add next event"][!UpdateMeter MeterEventLabel2][!Redraw]
IfNotMatchAction=[!SetOption MeterEventLabel2 FontColor "#DateEventsDark.Color.DayNumber#"][!SetOption MeterEventLabel2 ToolTipText "Click to edit"][!UpdateMeter MeterEventLabel2][!Redraw]

