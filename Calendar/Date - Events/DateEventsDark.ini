[MeasureEventManager]
Measure=Script
ScriptFile=#@#Calendar\EventManager.lua
UpdateDivider=-1

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#DateEventsDark.IconSize#*#ScaleDpi#),(#DateEventsDark.IconSize#*#ScaleDpi#),(#DateEventsDark.IconSize#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0
X=0
Y=0
UpdateDivider=-1
AntiAlias=1
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#DateEventsDark.IconSize#*#ScaleDpi#)
H=(#DateEventsDark.IconSize#*#ScaleDpi#)
UpdateDivider=-1
Container=BlurContainer
DynamicVariables=1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#DateEventsDark.IconSize#*#ScaleDpi#),(#DateEventsDark.IconSize#*#ScaleDpi#),(#DateEventsDark.IconSize#*0.18*#ScaleDpi#) | StrokeWidth (3*#ScaleDpi#) | Stroke Color #DateEventsDark.Color.Border# | Fill LinearGradient FillGradient
FillGradient=#DarkGradient#
X=0
Y=0
UpdateDivider=-1
AntiAlias=1
DynamicVariables=1

[MeterDayName]
Meter=String
MeasureName=MeasureDayName
X=(#DateEventsDark.IconSize#/2*0.2*#ScaleDpi#)
Y=(#DateEventsDark.IconSize#*0.1*#ScaleDpi#)
W=(#DateEventsDark.IconSize#*#ScaleDpi#)
H=(#DateEventsDark.IconSize#*0.25*#ScaleDpi#)
