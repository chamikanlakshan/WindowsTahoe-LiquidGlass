FontWeight=#DateEventsDark.FontWeight#
FontColor=#DateEventsDark.Color.DayName#
StringAlign=Left
AntiAlias=1
UpdateDivider=3600
DynamicVariables=1
Text=%1
StringCase=Upper

[MeterDayNumber]
