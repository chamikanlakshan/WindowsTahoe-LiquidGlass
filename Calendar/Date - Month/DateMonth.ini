[Rainmeter]
Update=60000
Group=WidgetsLight
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Dark
ContextAction2=[!WriteKeyValue Variables ThemeDateMonth "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Calendar\Date - Month" "DateMonthDark.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowDateMonth "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
LocalTransparency=0
@include1=#@#Calender\Variables.inc
@include2=#@#GlobalSettings.in

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=(#CURRENTCONFIGX# + #Date.Blur.OffsetX#)
YPos=(#CURRENTCONFIGY# + #Date.Blur.OffsetY#)
XWidth=(#Date.IconSize#*#ScaleDpi#)
XHeight=(#Date.IconSize#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureDayName]
Measure=Time
Format=%a
UpdateDivider=3600

[MeasureMonth]
Measure=Time
Format=%b
UpdateDivider=3600

[MeasureDayNumber]
Measure=Time
Format=%#d
UpdateDivider=3600

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#Date.IconSize#*#ScaleDpi#),(#Date.IconSize#*#ScaleDpi#),(#Date.IconSize#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0
X=0
Y=0
UpdateDivider=-1
AntiAlias=1
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#Date.IconSize#*#ScaleDpi#)
H=(#Date.IconSize#*#ScaleDpi#)
UpdateDivider=-1
Container=BlurContainer
DynamicVariables=1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#Date.IconSize#*#ScaleDpi#),(#Date.IconSize#*#ScaleDpi#),(#Date.IconSize#*0.18*#ScaleDpi#) | StrokeWidth (3*#ScaleDpi#) | Stroke Color #Date.Color.Border# | Fill LinearGradient FillGradient
FillGradient=#LightGradient#
X=0
Y=0
UpdateDivider=-1
AntiAlias=1
DynamicVariables=1

[MeterDayName]
Meter=String
MeasureName=MeasureDayName
MeasureName2=MeasureMonth
X=(#Date.IconSize#/2*#ScaleDpi#)
Y=(#Date.IconSize#*0.241*#ScaleDpi#)
W=(#Date.IconSize#*#ScaleDpi#)
H=(#Date.IconSize#*0.25*#ScaleDpi#)
FontFace=#Date.FontFace#
FontSize=(#Date.IconSize#*0.13*#ScaleDpi#)
FontWeight=#Date.FontWeight#
FontColor=#Date.Color.DayName#
StringAlign=CenterCenter
AntiAlias=1
UpdateDivider=3600
DynamicVariables=1
Text=%1 %2

[MeterDayNumber]
Meter=String
MeasureName=MeasureDayNumber
X=(#Date.IconSize#/2*#ScaleDpi#)
Y=(#Date.IconSize#*0.651*#ScaleDpi#)
W=(#Date.IconSize#*#ScaleDpi#)
H=(#Date.IconSize#*0.5*#ScaleDpi#)
FontFace=#Date.FontFace#
FontSize=(#Date.IconSize#*0.45*#ScaleDpi#)
FontWeight=#Date.FontWeight#
FontColor=#Date.Color.DayNumber#
StringAlign=CenterCenter
AntiAlias=1
UpdateDivider=3600
DynamicVariables=1
Text=%1


[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-Light
DynamicVariables=1
IfMatch=1-Light
IfMatchAction=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=0-Light
IfMatchAction2=[!SetOption Shape FillGradient "#LightGradient#"][!UpdateMeter *][!Redraw]