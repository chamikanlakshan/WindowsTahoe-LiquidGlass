[Rainmeter]
Update=60000
Group=WidgetsDark
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Light
ContextAction2=[!WriteKeyValue Variables ThemeDateMonth "Light" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Calendar\Date - Month" "DateMonth.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowDateMonth "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.3
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
LocalTransparency=0
@include1=#@#GlobalSettings.inc
@include2=#@#Calendar\Variables.inc

LG.W=#DateDark.IconSize#
LG.H=#DateDark.IconSize#
LG.R=#DateDark.IconSize#*0.18

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=(#CURRENTCONFIGX# + #DateDark.Blur.OffsetX#)
YPos=(#CURRENTCONFIGY# + #DateDark.Blur.OffsetY#)
XWidth=(#DateDark.IconSize#*#ScaleDpi#)
XHeight=(#DateDark.IconSize#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureDayName]
Measure=Time
Format=%a
UpdateDivider=3600

[MeasureMonth]
Measure=Time
Format=%b
UpdateDivider=3600

[MeasureDayNumber]
Measure=Time
Format=%#d
UpdateDivider=3600

@includeShadow=#@#Shadow.inc

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#DateDark.IconSize#*#ScaleDpi#),(#DateDark.IconSize#*#ScaleDpi#),(#DateDark.IconSize#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0
X=0
Y=0
UpdateDivider=-1
AntiAlias=1
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#DateDark.IconSize#*#ScaleDpi#)
H=(#DateDark.IconSize#*#ScaleDpi#)
UpdateDivider=-1
Container=BlurContainer
DynamicVariables=1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#DateDark.IconSize#*#ScaleDpi#),(#DateDark.IconSize#*#ScaleDpi#),(#DateDark.IconSize#*0.18*#ScaleDpi#) | StrokeWidth (#StrokeWidth#*#ScaleDpi#) | Stroke Color #DateDark.Color.Border# | Fill LinearGradient FillGradient
FillGradient=#DarkGradient#
X=0
Y=0
UpdateDivider=-1
AntiAlias=1
DynamicVariables=1

[MeterDayName]
Meter=String
MeasureName=MeasureDayName
MeasureName2=MeasureMonth
X=(#DateDark.IconSize#/2*#ScaleDpi#)
Y=(#DateDark.IconSize#*0.241*#ScaleDpi#)
W=(#DateDark.IconSize#*#ScaleDpi#)
H=(#DateDark.IconSize#*0.25*#ScaleDpi#)
FontFace=#Date.FontFace#
FontSize=(#DateDark.IconSize#*0.13*#ScaleDpi#)
FontWeight=#Date.FontWeight#
FontColor=#DateDark.Color.DayName#
StringAlign=CenterCenter
AntiAlias=1
UpdateDivider=3600
DynamicVariables=1
Text=%1 %2

[MeterDayNumber]
Meter=String
MeasureName=MeasureDayNumber
X=(#DateDark.IconSize#/2*#ScaleDpi#)
Y=(#DateDark.IconSize#*0.651*#ScaleDpi#)
W=(#DateDark.IconSize#*#ScaleDpi#)
H=(#DateDark.IconSize#*0.5*#ScaleDpi#)
FontFace=#Date.FontFace#
FontSize=(#DateDark.IconSize#*0.45*#ScaleDpi#)
FontWeight=#Date.FontWeight#
FontColor=#DateDark.Color.DayNumber#
StringAlign=CenterCenter
AntiAlias=1
UpdateDivider=3600
DynamicVariables=1
Text=%1


[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-Dark
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=0-Dark
IfMatchAction2=[!SetOption Shape FillGradient "#DarkGradient#"][!UpdateMeter *][!Redraw]
