MonthLabels=JANUARY|FEBRUARY|MARCH|APRIL|MAY|JUNE|JULY|AUGUST|SEPTEMBER|OCTOBER|NOVEMBER|DECEMBER
LabelText={$MName}

CalSize=#CalWide.Size#
CalDate.IconSize=(#CalWide.GridH#*0.94)

C.w=#CalWide.C.w#
C.h=#CalWide.C.h#
Space.x=#CalWide.Space.x#
Space.y=#CalWide.Space.y#
Bumper.x=#CalWide.Bumper#
Bumper.left=#CalWide.Bumper#
Bumper.right=#CalWide.Bumper#
Bumper.top=#CalWide.Bumper#
Bumper.bottom=#CalWide.Bumper#
Cal.FontSize=#CalWide.FontSize#
Cal.W=#CalWide.GridW#
Cal.H=#CalWide.GridH#
CalOffsetY=0
CalOffsetX=#CalDate.IconSize#
Total.W=(#CalDate.IconSize# + #CalWide.GridW#)
Total.H=#CalWide.GridH#
CalWide.W=(#CalDate.IconSize# + #CalWide.GridW#)
CalWide.H=#CalWide.GridH#
Cal.Color.Today=#CalDark.Color.Today#

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=(#CURRENTCONFIGX# + #Blur.OffsetX#)
YPos=(#CURRENTCONFIGY# + #Blur.OffsetY#)
XWidth=(#CalWide.W#*#ScaleDpi#)
XHeight=(#CalWide.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureDayName]
Measure=Time
Format=%A
UpdateDivider=3600

[MeasureDayNumber]
Measure=Time
Format=%#d
UpdateDivider=3600

