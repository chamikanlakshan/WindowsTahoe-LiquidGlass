[Rainmeter]
Update=60000
Group=WidgetsDark
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Light
ContextAction2=[!WriteKeyValue Variables ThemeCalendarWide "Light" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Calendar\Calendar Wide" "CalendarWide.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Next Month
ContextAction6=[!CommandMeasure Lua Move(1)][!Update]
ContextTitle6=Next Year
ContextAction6=[!CommandMeasure Lua Move(12)][!Update]
ContextTitle7=Previous Month
ContextAction7=[!CommandMeasure Lua Move(-1)][!Update]
ContextTitle8=Previous Year
ContextAction8=[!CommandMeasure Lua Move(-12)][!Update]
ContextTitle9=Current Month
ContextAction9=[!CommandMeasure Lua Move()][!Update]
ContextTitle10=----
ContextAction10=[]
ContextTitle11=Close
ContextAction11=[!WriteKeyValue Variables ShowCalendarWide "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
MouseScrollUpAction=!CommandMeasure Lua "CombineScroll(1)"
MouseScrollDownAction=!CommandMeasure Lua "CombineScroll(-1)"

[Metadata]
