[Rainmeter]
Update=5000
Group=WidgetsLight
OnRefreshAction=[]

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Center Horizontally
ContextAction=[!Move "(#SCREENAREAWIDTH#/2-#CURRENTCONFIGWIDTH#/2)" "#CURRENTCONFIGY#"]
ContextTitle2=Center Vertically
ContextAction2=[!Move "#CURRENTCONFIGX#" "(#SCREENAREAHEIGHT#/2-#CURRENTCONFIGHEIGHT#/2)"]
ContextTitle3=Center Both
ContextAction3=[!Move "(#SCREENAREAWIDTH#/2-#CURRENTCONFIGWIDTH#/2)" "(#SCREENAREAHEIGHT#/2-#CURRENTCONFIGHEIGHT#/2)"]
ContextTitle4=----
ContextAction4=[]
ContextTitle5=Refresh skin
ContextAction5=[!Refresh]
ContextTitle6=Switch to Dark
ContextAction6=[!WriteKeyValue Variables ThemeClockDate "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\ClockDate" "ClockDateDark.ini"]
ContextTitle7=Transparency Mode Turn On/Off
ContextAction7=[!WriteKeyValue Variables LocalTransparencyClockDate "(1-#LocalTransparencyClockDate#)" "#@#GlobalSettings.inc"][!Refresh]
ContextTitle8=Settings
ContextAction8=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle9=----
ContextAction9=[]
ContextTitle10=Close
ContextAction10=[!WriteKeyValue Variables ShowClockDate "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
SkinWidth=#ClockDate.SkinWidth#
SkinHeight=#ClockDate.SkinHeight#
DateY=#ClockDate.DateY#
HoursY=#ClockDate.HoursY#
MinutesY=#ClockDate.MinutesY#
TimeY=#ClockDate.TimeY#
DateFontSize=#ClockDate.DateFontSize#
HoursFontSize=#ClockDate.HoursFontSize#
MinutesFontSize=#ClockDate.MinutesFontSize#
TimeFontSize=#ClockDate.TimeFontSize#
HoursFontWeight=#ClockDate.HoursFontWeight#
MinutesFontWeight=#ClockDate.MinutesFontWeight#
TimeFontWeight=#ClockDate.TimeFontWeight#
DateFontWeight=#ClockDate.DateFontWeight#
FontFace=#ClockDate.FontFace#

TextColor=255,255,255,255
DateColor=255,255,255,255

[MeasureHours]
Measure=Time
Format=%I
UpdateDivider=12

[MeasureMinutes]
Measure=Time
Format=%M
UpdateDivider=12

[MeasureDate]
Measure=Time
Format=%a, %B %#d
UpdateDivider=720

[BackgroundBounds]
Meter=Image
SolidColor=0,0,0,1
X=0
Y=0
W=(#SkinWidth#*#ScaleDpi#)
H=(#SkinHeight#*#ScaleDpi#)
UpdateDivider=-1

[MeterHours]
Meter=String
MeasureName=MeasureHours
X=(#SkinWidth#/2*#ScaleDpi#)
Y=(#HoursY#*#ScaleDpi#)
FontSize=(#HoursFontSize#*#ScaleDpi#)
FontFace=#FontFace#
FontWeight=#HoursFontWeight#
FontColor=#TextColor#
StringAlign=CenterCenter
AntiAlias=1

[MeterMinutes]
Meter=String
MeasureName=MeasureMinutes
X=(#SkinWidth#/2*#ScaleDpi#)
Y=(#MinutesY#*#ScaleDpi#)
FontSize=(#MinutesFontSize#*#ScaleDpi#)
FontFace=#FontFace#
FontWeight=#MinutesFontWeight#
FontColor=#TextColor#
StringAlign=CenterCenter
AntiAlias=1

[MeterDate]
Meter=String
MeasureName=MeasureDate
X=(#SkinWidth#/2*#ScaleDpi#)
Y=(#DateY#*#ScaleDpi#)
FontSize=(#DateFontSize#*#ScaleDpi#)
FontFace=#FontFace#
FontWeight=#DateFontWeight#
FontColor=#DateColor#
StringAlign=CenterCenter
AntiAlias=1

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparencyClockDate#-Light
DynamicVariables=1
IfMatch=1-Light
IfMatchAction=[!SetOption MeterHours FontColor "255,255,255,255"][!SetOption MeterMinutes FontColor "255,255,255,255"][!SetOption MeterDate FontColor "255,255,255,255"][!UpdateMeter *][!Redraw]
IfMatch2=0-Light
IfMatchAction2=[!SetOption MeterHours FontColor "255,255,255,140"][!SetOption MeterMinutes FontColor "255,255,255,140"][!SetOption MeterDate FontColor "255,255,255,140"][!UpdateMeter *][!Redraw]
