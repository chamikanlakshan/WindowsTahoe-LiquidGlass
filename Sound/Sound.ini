[Rainmeter]
Update=2000
Group=WidgetsLight
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue]

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Dark
ContextAction2=[!WriteKeyValue Variables ThemeSound "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Sound" "SoundDark.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowSound "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.3
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include=#@#GlobalSettings.inc
@Include2=#@#Sound/Variables.inc
LocalTransparency=0
Sou.W=#Sound.SkinWidth#
Sou.H=#Sound.SkinHeight#
SkinWidth=#Sound.SkinWidth#
SkinHeight=#Sound.SkinHeight#
LabelY=#Sound.LabelY#
IconY=#Sound.IconY#
BarY=#Sound.BarY#
IconSize=#Sound.IconSize#
BarH=#Sound.BarH#
ClickY=#Sound.ClickY#
ClickH=#Sound.ClickH#
IconMargin=#Sound.IconMargin#
BarX=#Sound.BarX#
BarW=#Sound.BarW#
IconHighX=#Sound.IconHighX#
FontSize=#Sound.FontSize#
FontWeight=#Sound.FontWeight#
FontFace=#Sound.FontFace#

ThemeSound=Light
TextColor=0,0,0,255
BarBackColor=242,242,247,120
BarFillColor=0,0,0,255

LG.W=#SkinWidth#
LG.H=#SkinHeight#
LG.R=#SkinHeight#*#Sound.CornerRadius#

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=(#Sou.W#*#ScaleDpi#)
XHeight=(#Sou.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

@includeShadow=#@#Shadow.inc

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#SkinWidth#*#ScaleDpi#),(#SkinHeight#*#ScaleDpi#),(#SkinHeight#*#Sound.CornerRadius#*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#SkinWidth#*#ScaleDpi#)
H=(#SkinHeight#*#ScaleDpi#)
Container=BlurContainer
UpdateDivider=-1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#SkinWidth#*#ScaleDpi#),(#SkinHeight#*#ScaleDpi#),(#SkinHeight#*#Sound.CornerRadius#*#ScaleDpi#) | StrokeWidth (#Sound.StrokeWidthLight#*#ScaleDpi#) | Stroke Color 255,255,255,60 | Fill LinearGradient FillGradient
FillGradient=#LightGradient#
X=0
Y=0
AntiAlias=1
RightMouseUpAction=[!SkinCustomMenu]
MouseScrollUpAction=[!CommandMeasure MeasureWin7Audio "ChangeVolume 5"][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
MouseScrollDownAction=[!CommandMeasure MeasureWin7Audio "ChangeVolume -5"][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]

[MeasureWin7Audio]
Measure=Plugin
Plugin=Win7AudioPlugin
UpdateDivider=-1
OnChangeAction=[!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Redraw]

[MeasureDeviceName]
Measure=Plugin
Plugin=Win7AudioPlugin
OutputType=DeviceName
UpdateDivider=60

[MeterLabel]
Meter=String
MeasureName=MeasureDeviceName
Text=%1
X=(18*#ScaleDpi#)
Y=(#LabelY#*#ScaleDpi#)
W=((#SkinWidth#-40)*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
ClipString=1
FontSize=(#FontSize#*#ScaleDpi#)
FontFace=#FontFace#
FontWeight=#FontWeight#
FontColor=#TextColor#
AntiAlias=1

[MeterIconLow]
Meter=Image
ImageName=#@#Images/DisplaySound/Sound/#ThemeSound#/VolumeLow.png
X=(#IconMargin#*#ScaleDpi#)
Y=(#IconY#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
PreserveAspectRatio=1
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureWin7Audio "ToggleMute"][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
RightMouseUpAction=[!SkinCustomMenu]

[MeterBarBack]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),(#BarY#*#ScaleDpi#),(#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(#BarH#*#ScaleDpi#*0.5) | Fill Color #BarBackColor# | StrokeWidth 0
AntiAlias=1
 
[MeasureBarWidth]
Measure=Calc
Formula=(MeasureWin7Audio/100)*#BarW#
DynamicVariables=1

[MeterBarValue]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),(#BarY#*#ScaleDpi#),([MeasureBarWidth]*#ScaleDpi#),(#BarH#*#ScaleDpi#),(#BarH#*#ScaleDpi#*0.5) | Fill Color #BarFillColor# | StrokeWidth 0
AntiAlias=1
DynamicVariables=1

[MeterClickArea]
Meter=Image
X=(#BarX#*#ScaleDpi#)
Y=(#ClickY#*#ScaleDpi#)
W=(#BarW#*#ScaleDpi#)
H=(#ClickH#*#ScaleDpi#)
SolidColor=0,0,0,1
LeftMouseDownAction=[!CommandMeasure MeasureWin7Audio "SetVolume $MouseX:%$"][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
LeftMouseDragAction=[!CommandMeasure MeasureWin7Audio "SetVolume $MouseX:%$"][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
RightMouseUpAction=[!SkinCustomMenu]
DynamicVariables=1

[MeterIconHigh]
Meter=Image
ImageName=#@#Images/DisplaySound/Sound/#ThemeSound#/VolumeHigh.png
X=(#IconHighX#*#ScaleDpi#)
Y=(#IconY#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
PreserveAspectRatio=1
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureWin7Audio "SetVolume 100"][!UpdateMeasure MeasureWin7Audio][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
RightMouseUpAction=[!SkinCustomMenu]

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-#ThemeSound#
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=1-Light
IfMatchAction2=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch3=0-Dark
IfMatchAction3=[!SetOption Shape FillGradient "#DarkGradient#"][!UpdateMeter *][!Redraw]
IfMatch4=0-Light
IfMatchAction4=[!SetOption Shape FillGradient "#LightGradient#"][!UpdateMeter *][!Redraw]

