
[Rainmeter]
Update=2000
OnRefreshAction=[!CommandMeasure MeasureAutoScale "ApplyScale()"]

[Metadata]
Name=Windows Tahoe - Liquid Glass - AutoScale 2
Author=Chamika N Lakshan
Version=1.0.0

[Variables]
@include=#@#GlobalSettings.inc

[MeasureScreenWidth]
Measure=Calc
Formula=#SCREENAREAWIDTH#
DynamicVariables=1
OnChangeAction=[!CommandMeasure MeasureAutoScale "ApplyScale()"]

[MeasureScreenHeight]
Measure=Calc
Formula=#SCREENAREAHEIGHT#
DynamicVariables=1
OnChangeAction=[!CommandMeasure MeasureAutoScale "ApplyScale()"]

[MeasureAutoScale]
Measure=Script
ScriptFile=#@#AutoScale2.lua
DynamicVariables=1
UpdateDivider=-1

[MeterInvisible]
Meter=Shape
Shape=Rectangle 0,0,1,1 | Fill Color 0,0,0,0 | StrokeWidth 0
X=0
Y=0