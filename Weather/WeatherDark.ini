[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1
Group=WidgetsDark
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Blue
ContextAction2=[!WriteKeyValue Variables ThemeWeather "Blue" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Weather" "WeatherBlue.ini"]
ContextTitle3=Set Location
ContextAction3=[!ActivateConfig "Windows Tahoe - Liquid Glass\Weather\WeatherLocation" "WeatherLocation.ini"]
ContextTitle4=Transparency Mode Turn On/Off
ContextAction4=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle5=Settings
ContextAction5=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle6=----
ContextAction6=[]
ContextTitle7=Close
ContextAction7=[!WriteKeyValue Variables ShowWeather "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include=#@#GlobalSettings.inc
@Include2=#@#Weather\Variables.inc
ThemeWeather=Dark
LocalTransparency=0
Lat=#Wea.Lat#
Lon=#Wea.Lon#
CityOverride=#Wea.City#

LG.W=#Wea.W#
LG.H=#Wea.H#
LG.R=#Wea.H#*0.18

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=(#Wea.W#*#ScaleDpi#)
XHeight=(#Wea.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureLocation]
Measure=WebParser
URL=http://ip-api.com/json/
RegExp=(?siU)"city":"(.*)".*"lat":(.*),.*"lon":(.*),
UpdateRate=#Wea.LocationUpdateRate#

[MeasureCity]
Measure=WebParser
URL=[MeasureLocation]
StringIndex=1

[MeasureCityDisplay]
Measure=String
String=#CityOverride#
DynamicVariables=1
IfMatch=.+
IfMatchAction=[!SetOption MeterCityName MeasureName ""][!SetOption MeterCityName Text "#CityOverride#"][!UpdateMeter MeterCityName][!Redraw]
IfNotMatchAction=[!SetOption MeterCityName MeasureName "MeasureCity"][!SetOption MeterCityName Text "%1"][!UpdateMeter MeterCityName][!Redraw]
UpdateDivider=-1

[MeasureLat]
Measure=WebParser
URL=[MeasureLocation]
StringIndex=2

[MeasureLon]
Measure=WebParser
URL=[MeasureLocation]
StringIndex=3

[MeasureWeather]
Measure=WebParser
URL=https://api.open-meteo.com/v1/forecast?latitude=#Lat#&longitude=#Lon#&daily=temperature_2m_max,temperature_2m_min&current=temperature_2m,weather_code&timezone=auto
RegExp=(?siU)"current":\{.*"temperature_2m":([\d\.-]+),.*"weather_code":(\d+).*"daily":\{.*"temperature_2m_max":\[([\d\.-]+)[,\]].*"temperature_2m_min":\[([\d\.-]+)[,\]]
UpdateRate=#Wea.UpdateRate#
DynamicVariables=1
UserAgent=Rainmeter WindowsTahoeSkin/1.0
FinishAction=[!UpdateMeasure MeasureWeatherCode]

[MeasureIconName]
Measure=Script
ScriptFile=#@#Weather\WMOMapper.lua

[MeasureTemp]
Measure=WebParser
URL=[MeasureWeather]
StringIndex=1
RegExpSubstitute=1
Substitute="([-]?\d+)\.\d+":"\1","^$":"--"

[MeasureWeatherCode]
Measure=WebParser
URL=[MeasureWeather]
StringIndex=2
OnChangeAction=[!UpdateMeasure MeasureIconName][!UpdateMeter MeterIcon][!UpdateMeter MeterSummary][!Redraw]

[MeasureDesc]
Measure=Script
ScriptFile=#@#Weather\WMOMapperDesc.lua

[MeasureHigh]
Measure=WebParser
URL=[MeasureWeather]
StringIndex=3
RegExpSubstitute=1
Substitute="([-]?\d+)\.\d+":"\1","^$":"--"

[MeasureLow]
Measure=WebParser
URL=[MeasureWeather]
StringIndex=4
RegExpSubstitute=1
Substitute="([-]?\d+)\.\d+":"\1","^$":"--"

@includeShadow=#@#Shadow.inc

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#Wea.W#*#ScaleDpi#),(#Wea.H#*#ScaleDpi#),(#Wea.H#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
DynamicVariables=1
X=0
Y=0
W=(#Wea.W#*#ScaleDpi#)
H=(#Wea.H#*#ScaleDpi#)
Container=BlurContainer

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#Wea.W#*#ScaleDpi#),(#Wea.H#*#ScaleDpi#),(#Wea.H#*0.18*#ScaleDpi#) | StrokeWidth (#StrokeWidth#*#ScaleDpi#) | Stroke Color 255,255,255,30 | Fill LinearGradient FillGradient
FillGradient=#DarkGradient#
X=0
Y=0
AntiAlias=1
DynamicVariables=1

[MeterCityName]
Meter=String
MeasureName=MeasureCity
X=(#Wea.Pad#*#ScaleDpi#)
Y=(#Wea.Y.City#*#ScaleDpi#)
FontFace=#Wea.FontFace#
FontSize=(#Wea.FontSize.City#*#ScaleDpi#)
FontWeight=#Wea.FontWeight.City#
FontColor=#Wea.Color.Text#
InlineSetting=CharacterSpacing | 0.5
InlinePattern=.*
AntiAlias=1
DynamicVariables=1
Text="%1"

[MeterTempBig]
Meter=String
MeasureName=MeasureTemp
X=(#Wea.Pad#*#ScaleDpi#)
Y=(#Wea.Y.Temp#*#ScaleDpi#)
FontFace=#Wea.FontFace#
FontSize=(#Wea.FontSize.Temp#*#ScaleDpi#)
FontWeight=#Wea.FontWeight.Temp#
FontColor=#Wea.Color.Text#
AntiAlias=1
DynamicVariables=1
Text="%1[\x00B0]"

[MeterIcon]
Meter=Image
X=(#Wea.Pad#*#ScaleDpi#)
Y=((#Wea.Y.Summary#-(#Wea.IconSize#*0.8)-(#Wea.H#*0))*#ScaleDpi#)
W=(#Wea.IconSize#*#ScaleDpi#*0.8)
H=(#Wea.IconSize#*#ScaleDpi#*0.8)
DynamicVariables=1
AntiAlias=1

[MeterSummary]
Meter=String
X=(#Wea.Pad#*#ScaleDpi#)
Y=(#Wea.Y.Summary#*#ScaleDpi#)
FontFace=#Wea.FontFace#
FontSize=(#Wea.FontSize.Condition#*#ScaleDpi#)
FontWeight=#Wea.FontWeight.Condition#
FontColor=#Wea.Color.Text#
InlineSetting=CharacterSpacing | 0.5
InlinePattern=.*
AntiAlias=1
DynamicVariables=1
Text=""

[MeterHighLow]
Meter=String
MeasureName=MeasureHigh
MeasureName2=MeasureLow
X=(#Wea.Pad#*#ScaleDpi#)
Y=(#Wea.Y.HiLo#*#ScaleDpi#)
FontFace=#Wea.FontFace#
FontSize=(#Wea.FontSize.HiLo#*#ScaleDpi#)
FontWeight=#Wea.FontWeight.HiLo#
FontColor=#Wea.Color.HiLo#
InlineSetting=CharacterSpacing | 0.5
InlinePattern=.*
AntiAlias=1
DynamicVariables=1
Text="H:%1[\x00B0] L:%2[\x00B0]"

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-#ThemeWeather#
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=1-Light
IfMatchAction2=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]
