[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
AlwaysOnTop=0

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
PW=400
PH=451
GapAfterDivider=20
GapLabelToField=8
FieldH=38
GapFieldToLabel=18
GapFieldToHint=14
FontFace=Inter
FontSize=11
FontWeight=400
FontColor=255,255,255,255
FieldBGColor=242,242,247,80
InputBGColor=242,242,247,80
LabelColor=242,242,247,255
HintColor=242,242,247,255
InputFontColor=0,0,0,255
InputFontWeight=400
InputCity=
InputLat=
InputLon=

[Background]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 20,20,24,220 | StrokeWidth 1 | Stroke Color 60,60,70,180
X=0
Y=0

[TitleText]
Meter=String
Text=Set Location
FontFace=#FontFace#
FontSize=15
FontWeight=700
FontColor=#FontColor#
AntiAlias=1
X=35
Y=30

[CloseBtn]
Meter=Image
ImageName=#@#Images\Close.png
X=(#PW#-60)
Y=20
W=30
H=30
PreserveAspectRatio=1
AntiAlias=1
MouseActionCursor=1
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption CloseBtn ImageAlpha "180"][!UpdateMeter CloseBtn][!Redraw]
MouseLeaveAction=[!SetOption CloseBtn ImageAlpha "255"][!UpdateMeter CloseBtn][!Redraw]
DynamicVariables=1

[Divider]
Meter=Shape
Shape=Rectangle 0,0,(#PW#-70),1,0 | Fill Color 55,55,65,200 | StrokeWidth 0
X=35
Y=20R
AntiAlias=0

[LabelCity]
Meter=String
Text=City Name
FontFace=#FontFace#
FontSize=10
FontWeight=600
FontColor=#LabelColor#
AntiAlias=1
X=35
Y=20R

[FieldCityBG]
Meter=Shape
Shape=Rectangle 0,0,(#PW#-70),#FieldH#,10 | Fill Color #FieldBGColor# | StrokeWidth 1 | Stroke Color 70,70,85,200
X=35
Y=15R
AntiAlias=1
DynamicVariables=1

[FieldCityText]
Meter=String
Text=#InputCity#
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#InputFontColor#
FontWeight=600
AntiAlias=1
StringAlign=Left
X=47
Y=9r
W=(#PW#-82)
H=(#FieldH#-9)
DynamicVariables=1

[LabelLat]
Meter=String
Text=Latitude
FontFace=#FontFace#
FontSize=10
FontWeight=600
FontColor=#LabelColor#
AntiAlias=1
X=35
Y=15R

[FieldLatBG]
Meter=Shape
Shape=Rectangle 0,0,(#PW#-70),#FieldH#,10 | Fill Color #FieldBGColor# | StrokeWidth 1 | Stroke Color 70,70,85,200
X=35
Y=15R
AntiAlias=1
DynamicVariables=1

[FieldLatText]
Meter=String
Text=#InputLat#
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#InputFontColor#
FontWeight=600
AntiAlias=1
StringAlign=Left
X=47
Y=9r
W=(#PW#-82)
H=(#FieldH#-9)
DynamicVariables=1

[LabelLon]
Meter=String
Text=Longitude
FontFace=#FontFace#
FontSize=10
FontWeight=600
FontColor=#LabelColor#
AntiAlias=1
X=35
Y=15R

[FieldLonBG]
Meter=Shape
Shape=Rectangle 0,0,(#PW#-70),#FieldH#,10 | Fill Color #FieldBGColor# | StrokeWidth 1 | Stroke Color 70,70,85,200
X=35
Y=15R
AntiAlias=1
DynamicVariables=1

[FieldLonText]
Meter=String
Text=#InputLon#
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#InputFontColor#
FontWeight=600
AntiAlias=1
StringAlign=Left
X=47
Y=9r
W=(#PW#-82)
H=(#FieldH#-9)
DynamicVariables=1

[HintText]
Meter=String
Text=Search your city's latitude & longitude and type it here.
FontFace=#FontFace#
FontSize=9
FontColor=#HintColor#
AntiAlias=1
X=35
Y=15R
W=(#PW#-70)
ClipString=1

[MeasureInputCity]
Measure=Plugin
Plugin=InputText
SolidColor=#InputBGColor#
FontColor=#InputFontColor#
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=#InputFontWeight#
X=39
Y=129
W=(#PW#-78)
H=(#FieldH#-12)
TopMost=1
FocusDismiss=1
DefaultValue=#InputCity#
Command1=[!SetVariable InputCity "$UserInput$"][!SetOption FieldCityText FontColor "#InputFontColor#"][!UpdateMeter FieldCityText][!Redraw]
OnDismissAction=[!SetOption FieldCityText FontColor "#InputFontColor#"][!UpdateMeter FieldCityText][!Redraw]
DynamicVariables=1

[MeasureInputLat]
Measure=Plugin
Plugin=InputText
SolidColor=#InputBGColor#
FontColor=#InputFontColor#
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=#InputFontWeight#
X=39
Y=214
W=(#PW#-78)
H=(#FieldH#-12)
TopMost=1
FocusDismiss=1
DefaultValue=#InputLat#
Command1=[!SetVariable InputLat "$UserInput$"][!SetOption FieldLatText FontColor "#InputFontColor#"][!UpdateMeter FieldLatText][!Redraw]
OnDismissAction=[!SetOption FieldLatText FontColor "#InputFontColor#"][!UpdateMeter FieldLatText][!Redraw]
DynamicVariables=1

[MeasureInputLon]
Measure=Plugin
Plugin=InputText
SolidColor=#InputBGColor#
FontColor=#InputFontColor#
FontFace=#FontFace#
FontSize=#FontSize#
FontWeight=#InputFontWeight#
X=39
Y=299
W=(#PW#-78)
H=(#FieldH#-12)
TopMost=1
FocusDismiss=1
DefaultValue=#InputLon#
Command1=[!SetVariable InputLon "$UserInput$"][!SetOption FieldLonText FontColor "#InputFontColor#"][!UpdateMeter FieldLonText][!Redraw]
OnDismissAction=[!SetOption FieldLonText FontColor "#InputFontColor#"][!UpdateMeter FieldLonText][!Redraw]
DynamicVariables=1

[ClickCity]
Meter=Image
SolidColor=0,0,0,1
X=35
Y=120
W=(#PW#-70)
H=#FieldH#
MouseActionCursor=1
LeftMouseUpAction=[!SetOption FieldCityText FontColor "0,0,0,0"][!UpdateMeter FieldCityText][!Redraw][!CommandMeasure MeasureInputCity "ExecuteBatch 1"]
DynamicVariables=1

[ClickLat]
Meter=Image
SolidColor=0,0,0,1
X=35
Y=202
W=(#PW#-70)
H=#FieldH#
MouseActionCursor=1
LeftMouseUpAction=[!SetOption FieldLatText FontColor "0,0,0,0"][!UpdateMeter FieldLatText][!Redraw][!CommandMeasure MeasureInputLat "ExecuteBatch 1"]
DynamicVariables=1

[ClickLon]
Meter=Image
SolidColor=0,0,0,1
X=35
Y=284
W=(#PW#-70)
H=#FieldH#
MouseActionCursor=1
LeftMouseUpAction=[!SetOption FieldLonText FontColor "0,0,0,0"][!UpdateMeter FieldLonText][!Redraw][!CommandMeasure MeasureInputLon "ExecuteBatch 1"]
DynamicVariables=1

[SaveButton]
Meter=Shape
Shape=Rectangle 0,0,(#PW#-70),42,12 | Fill Color 0,110,255,255 | StrokeWidth 0
X=35
Y=375
AntiAlias=1
MouseActionCursor=1
LeftMouseUpAction=[!WriteKeyValue Variables Wea.City "#InputCity#" "#@#Weather\Variables.inc"][!WriteKeyValue Variables Wea.Lat "#InputLat#" "#@#Weather\Variables.inc"][!WriteKeyValue Variables Wea.Lon "#InputLon#" "#@#Weather\Variables.inc"][!Refresh "Windows Tahoe - Liquid Glass\Weather"][!DeactivateConfig]
MouseOverAction=[!SetOption SaveButton Shape "Rectangle 0,0,(#PW#-70),42,12 | Fill Color 0,136,255,255 | StrokeWidth 0"][!UpdateMeter SaveButton][!Redraw]
MouseLeaveAction=[!SetOption SaveButton Shape "Rectangle 0,0,(#PW#-70),42,12 | Fill Color 0,110,255,255 | StrokeWidth 0"][!UpdateMeter SaveButton][!Redraw]
DynamicVariables=1

[SaveButtonLabel]
Meter=String
Text=Save & Apply
FontFace=#FontFace#
FontSize=12
FontWeight=600
FontColor=255,255,255,255
AntiAlias=1
StringAlign=CenterCenter
X=(#PW#/2)
Y=396
DynamicVariables=1