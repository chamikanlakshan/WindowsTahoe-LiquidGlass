
[Rainmeter]
DynamicWindowSize=1
Update=1000
AccurateText=1
OnRefreshAction=[!UpdateMeasure MeasureFirstRun][!Redraw]
DefaultWindowX=50%
DefaultWindowY=50%
DefaultAnchorX=50%
DefaultAnchorY=50%

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
PW=480
PH=430
FontFace=SF Pro Display

[MeasureThemeSwitcher]
Measure=Script
ScriptFile=#@#ThemeSwitcher.lua
UpdateDivider=-1

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=#PW#
XHeight=#PH#
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureFirstRun]
Measure=Calc
Formula=#FirstRunDone#
DynamicVariables=1
UpdateDivider=1
IfEqualValue=0
IfEqualAction=[!LoadLayout "WinTahoe 1"][!WriteKeyValue Variables FirstRunDone 1 "#@#GlobalSettings.inc"][!SetVariable FirstRunDone 1][!Log "First run detected ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Layout 1 applied automatically."]

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=#PW#
H=#PH#
Container=BlurContainer
UpdateDivider=-1

[Background]
Meter=Shape
Shape=Rectangle 0,0,#PW#,#PH#,20 | Fill Color 20,20,24,220 | StrokeWidth 1 | Stroke Color 60,60,70,180
X=0
Y=0
DynamicVariables=1

[TitleText]
Meter=String
Text=Windows Tahoe
FontFace=#FontFace#
FontSize=20
FontWeight=700
FontColor=255,255,255,255
AntiAlias=1
X=(#PW# / 2)
Y=36
StringAlign=Center
DynamicVariables=1

[SubtitleText]
Meter=String
Text=Liquid Glass
FontFace=#FontFace#
FontSize=12
FontWeight=400
FontColor=0,160,255,200
AntiAlias=1
X=(#PW# / 2)
Y=4R
StringAlign=Center
DynamicVariables=1

[Divider1]
Meter=Shape
Shape=Line 30,0,450,0 | Stroke Color 255,255,255,25 | StrokeWidth 1
X=0
Y=20R
DynamicVariables=1

[ChooseLabel]
Meter=String
Text=Choose your starting layout
FontFace=#FontFace#
FontSize=10
FontWeight=500
FontColor=140,140,150,255
AntiAlias=1
X=(#PW# / 2)
Y=20R
StringAlign=Center
DynamicVariables=1

[Layout1Thumb]
Meter=Image
ImageName=#@#Images\Thumbs\Layout01.jpg
X=40
Y=20R
W=180
H=100
PreserveAspectRatio=1
AntiAlias=1
MouseActionCursor=1
LeftMouseUpAction=[!LoadLayout "WinTahoe 1"][!WriteKeyValue Variables FirstRunDone 1 "#@#GlobalSettings.inc"][!SetVariable FirstRunDone 1]
MouseOverAction=[!SetOption Layout1Thumb ImageAlpha "180"][!UpdateMeter Layout1Thumb][!Redraw]
MouseLeaveAction=[!SetOption Layout1Thumb ImageAlpha "255"][!UpdateMeter Layout1Thumb][!Redraw]
DynamicVariables=1

[Layout2Thumb]
Meter=Image
ImageName=#@#Images\Thumbs\Layout02.jpg
X=260
Y=0r
W=180
H=100
PreserveAspectRatio=1
AntiAlias=1
MouseActionCursor=1
LeftMouseUpAction=[!LoadLayout "WinTahoe 2"][!WriteKeyValue Variables FirstRunDone 1 "#@#GlobalSettings.inc"][!SetVariable FirstRunDone 1]
MouseOverAction=[!SetOption Layout2Thumb ImageAlpha "180"][!UpdateMeter Layout2Thumb][!Redraw]
MouseLeaveAction=[!SetOption Layout2Thumb ImageAlpha "255"][!UpdateMeter Layout2Thumb][!Redraw]
DynamicVariables=1

[Layout1Label]
Meter=String
Text=Layout 1
FontFace=#FontFace#
FontSize=10
FontWeight=600
FontColor=240,240,245,220
AntiAlias=1
X=130
Y=15R
StringAlign=Center
DynamicVariables=1

[Layout2Label]
Meter=String
Text=Layout 2
FontFace=#FontFace#
FontSize=10
FontWeight=600
FontColor=240,240,245,220
AntiAlias=1
X=350
Y=0r
StringAlign=Center
DynamicVariables=1

[FooterNote]
Meter=String
Text=Layout applied automatically on first load.#CRLF#Change it anytime from Settings -> Appearance.
FontFace=#FontFace#
FontSize=8
FontWeight=400
FontColor=90,90,100,255
AntiAlias=1
X=(#PW# / 2)
Y=15R
W=(#PW# - 60)
ClipString=2
StringAlign=Center
DynamicVariables=1

[CloseBtn]
Meter=Shape
Shape=Rectangle 0,0,120,35,8 | Fill Color 0,120,212,255 | StrokeWidth 0
X=((#PW# - 120) / 2)
Y=15R
MouseActionCursor=1
LeftMouseUpAction=[!DeactivateConfig]
MouseOverAction=[!SetOption CloseBtn Shape "Rectangle 0,0,120,35,8 | Fill Color 0,100,190,255 | StrokeWidth 0"][!UpdateMeter CloseBtn][!Redraw]
MouseLeaveAction=[!SetOption CloseBtn Shape "Rectangle 0,0,120,35,8 | Fill Color 0,120,212,255 | StrokeWidth 0"][!UpdateMeter CloseBtn][!Redraw]
DynamicVariables=1

[CloseBtnText]
Meter=String
Text=Close
FontFace=#FontFace#
FontSize=11
FontWeight=600
FontColor=255,255,255,255
AntiAlias=1
X=(#PW# / 2)
Y=9r
StringAlign=Center
MouseActionCursor=1
LeftMouseUpAction=[!DeactivateConfig]
DynamicVariables=1