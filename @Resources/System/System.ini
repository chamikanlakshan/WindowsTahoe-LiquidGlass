[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
Group=WidgetsLight
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Dark
ContextAction2=[!WriteKeyValue Variables ThemeSystem "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\System" "SystemDark.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowSystem "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
ThemeSystem=Light
LocalTransparency=0

Pad=20
IconSize=20
IconLabelGap=10
LabelBarGap=10
LabelTextW=29
BarPercentGap=10
PercentW=44
RowGap=16
BarY_off=8
LabelYOff=2
BarH=4

FontSizeLabel=10
FontSizePercent=10
FontWeight=600

SkinW=#Sys.W#
LabelX=(#Pad#+#IconSize#+#IconLabelGap#)
BarX=(#Pad#+#IconSize#+#IconLabelGap#+#LabelTextW#+#LabelBarGap#)
PercentX=(#SkinW#-#Pad#)
SkinH=#Sys.H#

BarW=(#SkinW#-#Pad#-#PercentW#-#BarPercentGap#-#BarX#)

BgGrad=#LightGradient#
BarBg=242,242,247,120
BarCPU=0, 120, 212,255
BarRAM=142, 68, 173,255
BarNet=231, 76, 60,255
BarDisk=22, 160, 133,255
TextColor=0,0,0,255
SubColor=0,0,0,255
FontFace=SF Pro Display

NetMax=25000000

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=(#Sys.W#*#ScaleDpi#)
XHeight=(#Sys.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#SkinW#*#ScaleDpi#),(#SkinH#*#ScaleDpi#),(#SkinH#*#System.CornerRadius#*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#SkinW#*#ScaleDpi#)
H=(#SkinH#*#ScaleDpi#)
Container=BlurContainer
UpdateDivider=-1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#SkinW#*#ScaleDpi#),(#SkinH#*#ScaleDpi#),(#SkinH#*#System.CornerRadius#*#ScaleDpi#) | StrokeWidth (#System.StrokeWidthLight#*#ScaleDpi#) | Stroke Color 255,255,255,60 | Fill LinearGradient FillGradient
FillGradient=#LightGradient#
X=0
Y=0
AntiAlias=1

[MeasureCPU]
Measure=CPU
UpdateDivider=5

[MeasureRAM]
Measure=PhysicalMemory
UpdateDivider=10

[MeasureNetIn]
Measure=NetIn
Interface=Best
UpdateDivider=1

[MeasureNetOut]
Measure=NetOut
Interface=Best
UpdateDivider=1

[MeasureNetTotal]
Measure=Calc
Formula=MeasureNetIn + MeasureNetOut
UpdateDivider=1

[MeasureNetMbps]
Measure=Calc
Formula=MeasureNetTotal * 8 / 1000000
UpdateDivider=1

[MeasureDiskTotal]
Measure=FreeDiskSpace
Drive=C:
Total=1
UpdateDivider=-1

[MeasureDisk]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1
MaxValue=[MeasureDiskTotal]
UpdateDivider=120
DynamicVariables=1

[MeterCPUIcon]
Meter=Image
ImageName=#@#Images/System/#ThemeSystem#/Processor.png
X=(#Pad#*#ScaleDpi#)
Y=(#Pad#*#ScaleDpi#)
W=(#IconSize#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
AntiAlias=1

[MeterCPULabel]
Meter=String
Text=CPU
X=((#LabelX#)*#ScaleDpi#)
Y=((#Pad#+#LabelYOff#)*#ScaleDpi#)
FontFace=#FontFace#
FontSize=(#FontSizeLabel#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#TextColor#
AntiAlias=1

[MeterCPUBarBg]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+#BarY_off#)*#ScaleDpi#),(#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarBg# | StrokeWidth 0

[MeterCPUBar]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+#BarY_off#)*#ScaleDpi#),([MeasureCPU]/100*#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarCPU# | StrokeWidth 0
DynamicVariables=1

[MeterCPUPercent]
Meter=String
MeasureName=MeasureCPU
Text="%1%"
X=((#PercentX#)*#ScaleDpi#)
Y=((#Pad#+#LabelYOff#)*#ScaleDpi#)
W=(#PercentW#*#ScaleDpi#)
StringAlign=Right
FontFace=#FontFace#
FontSize=(#FontSizePercent#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#SubColor#
AntiAlias=1

[MeterRAMIcon]
Meter=Image
ImageName=#@#Images/System/#ThemeSystem#/RAM.png
X=(#Pad#*#ScaleDpi#)
Y=((#Pad#+1*(#IconSize#+#RowGap#))*#ScaleDpi#)
W=(#IconSize#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
AntiAlias=1

[MeterRAMLabel]
Meter=String
Text=RAM
X=((#LabelX#)*#ScaleDpi#)
Y=((#Pad#+1*(#IconSize#+#RowGap#)+#LabelYOff#)*#ScaleDpi#)
FontFace=#FontFace#
FontSize=(#FontSizeLabel#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#TextColor#
AntiAlias=1

[MeterRAMBarBg]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+1*(#IconSize#+#RowGap#)+#BarY_off#)*#ScaleDpi#),(#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarBg# | StrokeWidth 0

[MeterRAMBar]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+1*(#IconSize#+#RowGap#)+#BarY_off#)*#ScaleDpi#),([MeasureRAM:%]/100*#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarRAM# | StrokeWidth 0
DynamicVariables=1

[MeterRAMPercent]
Meter=String
MeasureName=MeasureRAM
Text="%1%"
X=((#PercentX#)*#ScaleDpi#)
Y=((#Pad#+1*(#IconSize#+#RowGap#)+#LabelYOff#)*#ScaleDpi#)
W=(#PercentW#*#ScaleDpi#)
StringAlign=Right
FontFace=#FontFace#
FontSize=(#FontSizePercent#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#SubColor#
Percentual=1
AntiAlias=1

[MeterNetIcon]
Meter=Image
ImageName=#@#Images/System/#ThemeSystem#/WiFi.png
X=(#Pad#*#ScaleDpi#)
Y=((#Pad#+2*(#IconSize#+#RowGap#))*#ScaleDpi#)
W=(#IconSize#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
AntiAlias=1

[MeterNetLabel]
Meter=String
Text=NET
X=((#LabelX#)*#ScaleDpi#)
Y=((#Pad#+2*(#IconSize#+#RowGap#)+#LabelYOff#)*#ScaleDpi#)
FontFace=#FontFace#
FontSize=(#FontSizeLabel#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#TextColor#
AntiAlias=1

[MeterNetBarBg]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+2*(#IconSize#+#RowGap#)+#BarY_off#)*#ScaleDpi#),(#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarBg# | StrokeWidth 0

[MeterNetBar]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+2*(#IconSize#+#RowGap#)+#BarY_off#)*#ScaleDpi#),(Clamp([MeasureNetMbps]/(#NetMax#*8/1000000),0,1)*#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarNet# | StrokeWidth 0
DynamicVariables=1

[MeterNetSpeed]
Meter=String
MeasureName=MeasureNetMbps
Text="%1 Mbps"
NumOfDecimals=1
X=((#PercentX#)*#ScaleDpi#)
Y=((#Pad#+2*(#IconSize#+#RowGap#)+#LabelYOff#)*#ScaleDpi#)
W=(#PercentW#*#ScaleDpi#)
StringAlign=Right
FontFace=#FontFace#
FontSize=(#FontSizePercent#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#SubColor#
AntiAlias=1

[MeterDiskIcon]
Meter=Image
ImageName=#@#Images/System/#ThemeSystem#/SSD.png
X=(#Pad#*#ScaleDpi#)
Y=((#Pad#+3*(#IconSize#+#RowGap#))*#ScaleDpi#)
W=(#IconSize#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
AntiAlias=1

[MeterDiskLabel]
Meter=String
Text=SSD
X=((#LabelX#)*#ScaleDpi#)
Y=((#Pad#+3*(#IconSize#+#RowGap#)+#LabelYOff#)*#ScaleDpi#)
FontFace=#FontFace#
FontSize=(#FontSizeLabel#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#TextColor#
AntiAlias=1

[MeterDiskBarBg]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+3*(#IconSize#+#RowGap#)+#BarY_off#)*#ScaleDpi#),(#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarBg# | StrokeWidth 0

[MeterDiskBar]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),((#Pad#+3*(#IconSize#+#RowGap#)+#BarY_off#)*#ScaleDpi#),([MeasureDisk:%]/100*#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(2*#ScaleDpi#) | Fill Color #BarDisk# | StrokeWidth 0
DynamicVariables=1

[MeterDiskPercent]
Meter=String
MeasureName=MeasureDisk
Text="%1%"
X=((#PercentX#)*#ScaleDpi#)
Y=((#Pad#+3*(#IconSize#+#RowGap#)+#LabelYOff#)*#ScaleDpi#)
W=(#PercentW#*#ScaleDpi#)
StringAlign=Right
FontFace=#FontFace#
FontSize=(#FontSizePercent#*#ScaleDpi#)
FontWeight=#FontWeight#
FontColor=#SubColor#
Percentual=1
AntiAlias=1

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-#ThemeSystem#
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=1-Light
IfMatchAction2=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch3=0-Dark
IfMatchAction3=[!SetOption Shape FillGradient "#DarkGradient#"][!UpdateMeter *][!Redraw]
IfMatch4=0-Light
IfMatchAction4=[!SetOption Shape FillGradient "#LightGradient#"][!UpdateMeter *][!Redraw]