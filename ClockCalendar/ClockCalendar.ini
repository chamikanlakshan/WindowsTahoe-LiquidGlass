[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-#ThemeClockCalendar#
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter Shape][!Redraw]
IfMatch2=1-Light
IfMatchAction2=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter Shape][!Redraw]
