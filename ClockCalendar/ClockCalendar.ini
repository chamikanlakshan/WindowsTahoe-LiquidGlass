[Rainmeter]
Update=5000
Group=WidgetsLight
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw]
AccurateText=1

RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Dark
ContextAction2=[!WriteKeyValue Variables ThemeClockCalendar "Dark" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\ClockCalendar" "ClockCalendarDark.ini"]
ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Next Month
ContextAction6=[!CommandMeasure Lua Move(1)][!Update]
ContextTitle7=Next Year
ContextAction7=[!CommandMeasure Lua Move(12)][!Update]
ContextTitle8=Previous Month
ContextAction8=[!CommandMeasure Lua Move(-1)][!Update]
ContextTitle9=Previous Year
ContextAction9=[!CommandMeasure Lua Move(-12)][!Update]
ContextTitle10=Current Month
ContextAction10=[!CommandMeasure Lua Move()][!Update]
ContextTitle11=----
ContextAction11=[]
ContextTitle12=Close
ContextAction12=[!WriteKeyValue Variables ShowClockCalendar "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
MouseScrollUpAction=!CommandMeasure Lua "CombineScroll(1)"
MouseScrollDownAction=!CommandMeasure Lua "CombineScroll(-1)"

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.0
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
LocalTransparency=0
@include1=#@#Calendar\CalendarVariables.ini
@include2=#@#GlobalSettings.inc
@include3=#@#Calendar\Variables.inc


MonthLabels=JANUARY|FEBRUARY|MARCH|APRIL|MAY|JUNE|JULY|AUGUST|SEPTEMBER|OCTOBER|NOVEMBER|DECEMBER
LabelText={$MName}
MonthLabel=

ClockCal.ClockSize=(#Cal.H#*0.94)
Size=#ClockCal.ClockSize#
C.w=#Cal.C.w#
C.h=#Cal.C.h#
Space.x=#Cal.Space.x#
Space.y=#Cal.Space.y#
Bumper.x=#Cal.Bumper#
Bumper.left=#Cal.Bumper#
Bumper.right=#Cal.Bumper#
Bumper.top=#Cal.Bumper#
Bumper.bottom=#Cal.Bumper#
Cal.FontSize=#Cal.FontSize#
Cal.W=#Cal.W#
Cal.H=#Cal.H#
CalOffsetY=0
CalOffsetX=#Size#
Total.W=(#Size# + #Cal.W#)
Total.H=#Cal.H#
CalWide.W=(#Size# + #Cal.W#)
CalWide.H=#Total.H#

LG.W=#Total.W#
LG.H=#Total.H#
LG.R=#Total.H#*0.18

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=(#CURRENTCONFIGX# + #Blur.OffsetX#)
YPos=(#CURRENTCONFIGY# + #Blur.OffsetY#)
XWidth=(#CalWide.W#*#ScaleDpi#)
XHeight=(#CalWide.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

[MeasureTime]
Measure=Time

[Lua]
Measure=Script
ScriptFile=#@#Calendar\Calendar.lua
UpdateDivider=1000

@includeShadow=#@#Shadow.inc

[BlurContainer1D]
Meter=Shape
Shape=Rectangle 0,0,(#Total.W#*#ScaleDpi#),(#Total.H#*#ScaleDpi#),(#Total.H#*0.18*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

[Blur]
Meter=Image
MeasureName=MeasureBlur
DynamicVariables=1
X=0
Y=0
W=(#Total.W#*#ScaleDpi#)
H=(#Total.H#*#ScaleDpi#)
Container=BlurContainer1D
UpdateDivider=-1

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#Total.W#*#ScaleDpi#),(#Total.H#*#ScaleDpi#),(#Total.H#*0.18*#ScaleDpi#) | StrokeWidth (#StrokeWidth#*#ScaleDpi#) | Stroke Color 255,255,255,60 | Fill LinearGradient FillGradient
FillGradient=#LightGradient#
X=0
Y=0
AntiAlias=1
DynamicVariables=1

[MeterClockFace]
Meter=Image
ImageName=#@#Images\Clock\ClockFace.png
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
X=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
Y=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
AntiAlias=1
UpdateDivider=-1

[MeterClockNumbers]
Meter=Image
ImageName=#@#Images\Clock\ClockNumbers.png
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
X=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
Y=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
UpdateDivider=-1

[MeterHoursHand]
Meter=Rotator
MeasureName=MeasureTime
ImageName=#@#Images\Clock\HoursHand.png
X=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
Y=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
TransformationMatrix=((#Size#*#ScaleDpi#)/#SourceSize#);0;0;((#Size#*#ScaleDpi#)/#SourceSize#);((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Cal.H#/2*#ScaleDpi#));((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Cal.H#/2*#ScaleDpi#))
ValueRemainder=43200
AntiAlias=1
UpdateDivider=60

[MeterMinutesHand]
Meter=Rotator
MeasureName=MeasureTime
ImageName=#@#Images\Clock\MinutesHand.png
X=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
Y=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
TransformationMatrix=((#Size#*#ScaleDpi#)/#SourceSize#);0;0;((#Size#*#ScaleDpi#)/#SourceSize#);((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Cal.H#/2*#ScaleDpi#));((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Cal.H#/2*#ScaleDpi#))
ValueRemainder=3600
AntiAlias=1
UpdateDivider=10

[MeterSecondsHand]
Meter=Rotator
MeasureName=MeasureTime
ImageName=#@#Images\Clock\SecondsHand.png
X=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
Y=(((#Cal.H# - #Size#) / 2) * #ScaleDpi#)
W=(#Size#*#ScaleDpi#)
H=(#Size#*#ScaleDpi#)
OffsetX=(#SourceSize# / 2)
OffsetY=(#SourceSize# / 2)
TransformationMatrix=((#Size#*#ScaleDpi#)/#SourceSize#);0;0;((#Size#*#ScaleDpi#)/#SourceSize#);((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Cal.H#/2*#ScaleDpi#));((1-((#Size#*#ScaleDpi#)/#SourceSize#))*(#Cal.H#/2*#ScaleDpi#))
ValueRemainder=60
AntiAlias=1
UpdateDivider=1

[LblTxtSty]
H=#C.h#
W=#C.w#
X=#Space.X#R
Y=r
FontFace=#Cal.FontFace#
FontWeight=#Cal.FontWeight#
FontColor=#Cal.Color.DayNames#
FontSize=#Cal.FontSize#
StringAlign=CenterCenter
AntiAlias=1

[LblTxtStart]

[LblCurrSty]
FontWeight=#Cal.FontWeight#

[TextStyle]
H=#C.h#
W=#C.w#
X=(#Space.x#+#C.w#)r
Y=r
FontColor=#Cal.Color.Dates#
FontFace=#Cal.FontFace#
FontWeight=#Cal.FontWeight#
FontSize=#Cal.FontSize#
StringAlign=CenterCenter
AntiAlias=1

[FirstDay]

[NewWk]
Y=#Space.y#R

[CurrentDay]
FontWeight=#Cal.FontWeight#
FontColor=#Cal.Color.TodayText#

[LastWeek]
FontColor=0,0,0,0

[PreviousMonth]
FontColor=0,0,0,0

[NextMonth]
FontColor=0,0,0,0

[HolidayStyle]
FontColor=170,170,170,100

[WeekendStyle]
FontColor=#Cal.Color.WeekendDates#

[TodayCircle]
Meter=Shape
Shape=Ellipse 0,0,1 | Fill Color #Cal.Color.Today# | StrokeWidth 0
X=0
Y=#CalOffsetY#
W=#C.w#
H=#C.h#
Hidden=1
DynamicVariables=1
AntiAlias=1

[mLabel]
Meter=String
Text=#MonthLabel#
W=(#C.w#*7+#Space.x#*6)
X=(#CalSize#/11+5.7)
Y=(#CalSize#/11 + #CalOffsetY#)
H=#C.h#
FontColor=#Cal.Color.Month#
FontFace=#Cal.FontFace#
FontWeight=#Cal.FontWeight#
FontSize=#Cal.FontSize#
StringAlign=LeftCenter
AntiAlias=1
DynamicVariables=1

[ControlForward]
Meter=String
MeterStyle=TextStyle
FontFace=Webdings
StringAlign=Left
Text="4"
Y=(#Bumper.top# + #CalOffsetY#)
X=((#C.w#*6+#Space.x#*6)+#Bumper.left#)
LeftMouseUpAction=[!CommandMeasure "Lua" "Move(1)"][!Update]
Hidden=1
DynamicVariables=1

[ControlBack]
Meter=String
MeterStyle=TextStyle|ControlForward
Text="3"
X=#Bumper.left#
LeftMouseUpAction=[!CommandMeasure "Lua" "Move(-1)"][!Update]
Hidden=1

[ControlHome]
Meter=String
MeterStyle=TextStyle|ControlForward
Text="="
X=R
LeftMouseUpAction=[!CommandMeasure "Lua" "Move()"][!Update]
Hidden=1

[Ghost]
Meter=Image
SolidColor=0,0,0,1
H=1
W=1
X=(#Total.W#-1)
Y=(#Total.H#-1)
DynamicVariables=1

[DebugBorder]
Meter=Shape
Shape=Rectangle 0,0,(#CalSize#*49/55+#CalSize#*24/500),(#CalSize#*49/55+#CalSize#*24/500) | Fill Color 0,0,0,0 | StrokeWidth 10 | Stroke Color 255,0,0,100
X=(#CalSize#/11)
Y=(#CalSize#/11+#CalSize#*21/500 + #CalOffsetY#)
DynamicVariables=1
AntiAlias=0
Hidden=1

