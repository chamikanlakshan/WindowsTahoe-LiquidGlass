[Rainmeter]
Update=2000
Group=WidgetsDark
OnRefreshAction=[!CommandMeasure MeasureBlur "Update"][!UpdateMeter Blur][!Redraw][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue]
RightMouseUpAction=[!SkinCustomMenu]
ContextTitle=Refresh skin
ContextAction=[!Refresh]
ContextTitle2=Switch to Light
ContextAction2=[!WriteKeyValue Variables ThemeDisplay "Light" "#@#GlobalSettings.inc"][!ActivateConfig "Windows Tahoe - Liquid Glass\Display" "Display.ini"]

ContextTitle3=Transparency Mode Turn On/Off
ContextAction3=[!WriteKeyValue Variables LocalTransparency "(1-#LocalTransparency#)"][!Refresh]
ContextTitle4=Settings
ContextAction4=[!ActivateConfig "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]
ContextTitle5=----
ContextAction5=[]
ContextTitle6=Close
ContextAction6=[!WriteKeyValue Variables ShowDisplay "0" "#@#GlobalSettings.inc"][!DeactivateConfig][!Refresh "Windows Tahoe - Liquid Glass\Settings" "Settings.ini"]

[Metadata]
Name=Windows Tahoe - Liquid Glass
Author=Chamika N Lakshan
Version=1.0.3
License=Creative Commons Attribution-NonCommercial-ShareAlike 4.0 International (CC BY-NC-SA 4.0)

[Variables]
@Include1=#@#GlobalSettings.inc
@Include2=#@#Display/Variables.inc
LocalTransparency=0
Dis.W=#Display.SkinWidth#
Dis.H=#Display.SkinHeight#
SkinWidth=#Display.SkinWidth#
SkinHeight=#Display.SkinHeight#
LabelY=#Display.LabelY#
IconY=#Display.IconY#
BarY=#Display.BarY#
IconSize=#Display.IconSize#
BarH=#Display.BarH#
ClickY=#Display.ClickY#
ClickH=#Display.ClickH#
IconMargin=#Display.IconMargin#
BarX=#Display.BarX#
BarW=#Display.BarW#
IconHighX=#Display.IconHighX#
FontSize=#Display.FontSize#
FontWeight=#Display.FontWeight#
FontFace=#Display.FontFace#

ThemeDisplay=Dark
TextColor=255,255,255,255
BarBackColor=242,242,247,120
BarFillColor=255,255,255,255

LG.W=#SkinWidth#
LG.H=#SkinHeight#
LG.R=#SkinHeight#*#Display.CornerRadius#

[MeasureBlur]
Measure=Plugin
Plugin=EasyBlur
UpdateDivider=-1
DynamicVariables=1
ScreenAreaWidth=#VSCREENAREAWIDTH#
ScreenAreaHeight=#VSCREENAREAHEIGHT#
XPos=#CURRENTCONFIGX#
YPos=#CURRENTCONFIGY#
XWidth=(#Dis.W#*#ScaleDpi#)
XHeight=(#Dis.H#*#ScaleDpi#)
Disabled=#BlurDisabled#
Intensity=4
DontResize=0
Zoom=1
FastBlur=1

@includeShadow=#@#Shadow.inc

[BlurContainer]
Meter=Shape
Shape=Rectangle 0,0,(#SkinWidth#*#ScaleDpi#),(#SkinHeight#*#ScaleDpi#),(#SkinHeight#*#Display.CornerRadius#*#ScaleDpi#) | Fill Color 255,255,255,255 | StrokeWidth 0

[Blur]
Meter=Image
MeasureName=MeasureBlur
X=0
Y=0
W=(#SkinWidth#*#ScaleDpi#)
H=(#SkinHeight#*#ScaleDpi#)
Container=BlurContainer

[Shape]
Meter=Shape
Shape=Rectangle 0,0,(#SkinWidth#*#ScaleDpi#),(#SkinHeight#*#ScaleDpi#),(#SkinHeight#*#Display.CornerRadius#*#ScaleDpi#) | StrokeWidth (#Display.StrokeWidthDark#*#ScaleDpi#) | Stroke Color 255,255,255,30 | Fill LinearGradient FillGradient
FillGradient=#DarkGradient#
X=0
Y=0
AntiAlias=1
RightMouseUpAction=[!SkinCustomMenu]
MouseScrollUpAction=[!CommandMeasure MeasureSetBrightness "SetBrightness(([MeasureBrightness]+5))"][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
MouseScrollDownAction=[!CommandMeasure MeasureSetBrightness "SetBrightness(([MeasureBrightness]-5))"][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]

[MeasureBrightness]
Measure=Plugin
Plugin=PowershellRM
Line=Get-CimInstance -Namespace root/WMI -ClassName WmiMonitorBrightness | Select-Object -ExpandProperty CurrentBrightness
UpdateDivider=10
DynamicVariables=1
OnChangeAction=[!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Redraw]

[MeasureSetBrightness]
Measure=Plugin
Plugin=PowershellRM
UpdateDivider=-1
Line=function SetBrightness($v) { $v = [Math]::Max(0, [Math]::Min(100, $v)); (Get-WmiObject -Namespace root/WMI -Class WmiMonitorBrightnessMethods).WmiSetBrightness(0, $v) }

[MeterLabel]
Meter=String
Text=Display
X=(#IconMargin#*#ScaleDpi#)
Y=(#LabelY#*#ScaleDpi#)
W=((#SkinWidth#-40)*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
FontSize=(#FontSize#*#ScaleDpi#)
FontFace=#FontFace#
FontWeight=#FontWeight#
FontColor=#TextColor#
AntiAlias=1

[MeterIconLow]
Meter=Image
ImageName=#@#Images/DisplaySound/Display/#ThemeDisplay#/BrightnessLow.png
X=(#IconMargin#*#ScaleDpi#)
Y=(#IconY#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
PreserveAspectRatio=1
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureSetBrightness "SetBrightness(0)"][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
RightMouseUpAction=[!SkinCustomMenu]

[MeterBarBack]
Meter=Shape
Shape=Rectangle (#BarX#*#ScaleDpi#),(#BarY#*#ScaleDpi#),(#BarW#*#ScaleDpi#),(#BarH#*#ScaleDpi#),(#BarH#*#ScaleDpi#*0.5) | Fill Color #BarBackColor# | StrokeWidth 0
AntiAlias=1

[MeasureBarWidth]
Measure=Calc
Formula=(MeasureBrightness/100)*#BarW#
DynamicVariables=1

[MeterBarValue]
Meter=Shape
MeasureName=MeasureBarWidth
Shape=Rectangle (#BarX#*#ScaleDpi#),(#BarY#*#ScaleDpi#),([MeasureBarWidth]*#ScaleDpi#),(#BarH#*#ScaleDpi#),(#BarH#*#ScaleDpi#*0.5) | Fill Color #BarFillColor# | StrokeWidth 0
AntiAlias=1
DynamicVariables=1

[MeterClickArea]
Meter=Image
X=(#BarX#*#ScaleDpi#)
Y=(#ClickY#*#ScaleDpi#)
W=(#BarW#*#ScaleDpi#)
H=(#ClickH#*#ScaleDpi#)
SolidColor=0,0,0,1
LeftMouseDownAction=[!CommandMeasure MeasureSetBrightness "SetBrightness $MouseX:%$"][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
LeftMouseDragAction=[!CommandMeasure MeasureSetBrightness "SetBrightness $MouseX:%$"][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
RightMouseUpAction=[!SkinCustomMenu]
DynamicVariables=1

[MeterIconHigh]
Meter=Image
ImageName=#@#Images/DisplaySound/Display/#ThemeDisplay#/BrightnessHigh.png
X=(#IconHighX#*#ScaleDpi#)
Y=(#IconY#*#ScaleDpi#)
H=(#IconSize#*#ScaleDpi#)
PreserveAspectRatio=1
AntiAlias=1
LeftMouseUpAction=[!CommandMeasure MeasureSetBrightness "SetBrightness(100)"][!UpdateMeasure MeasureBrightness][!UpdateMeasure MeasureBarWidth][!UpdateMeter MeterBarValue][!Update][!Redraw]
RightMouseUpAction=[!SkinCustomMenu]

[MeasureApplyLocalTransparency]
Measure=String
String=#LocalTransparency#-#ThemeDisplay#
DynamicVariables=1
IfMatch=1-Dark
IfMatchAction=[!SetOption Shape FillGradient "180 | 0,0,0,255 ; 0.0 | 0,0,0,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch2=1-Light
IfMatchAction2=[!SetOption Shape FillGradient "180 | 255,255,255,255 ; 0.0 | 255,255,255,255 ; 1.0"][!UpdateMeter *][!Redraw]
IfMatch3=0-Dark
IfMatchAction3=[!SetOption Shape FillGradient "#DarkGradient#"][!UpdateMeter *][!Redraw]
IfMatch4=0-Light
IfMatchAction4=[!SetOption Shape FillGradient "#LightGradient#"][!UpdateMeter *][!Redraw]
